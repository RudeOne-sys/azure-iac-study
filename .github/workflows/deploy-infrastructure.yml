name: Deploy Infrastructure

on:
  push:
    branches:
      - dev
    paths:
      - 'deployments/**'
      - 'modules/**'
      - 'environments/**'
  pull_request:
    branches:
      - main
    paths:
      - 'deployments/**'
      - 'modules/**'
      - 'environments/**'
  workflow_dispatch:
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  
jobs:
  # ─────────────────────────────────────────
  # JOB 1: Validate — runs on every trigger
  # ─────────────────────────────────────────
  validate:
    name: Validate Bicep Templates
    runs-on: ubuntu-latest
    environment: dev

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Lint Bicep templates
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az bicep build --file deployments/storage.bicep
            az bicep build --file deployments/compute.bicep
            az bicep build --file deployments/hubSpoke.bicep
            az bicep build --file deployments/nsg.bicep
            az bicep build --file deployments/firewall.bicep
            az bicep build --file deployments/loadBalancing.bicep

      - name: What-If DEV Storage
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            echo "========== STORAGE WHAT-IF =========="
            az deployment group what-if \
              --resource-group rg-iac-dev \
              --template-file deployments/storage.bicep \
              --parameters environments/dev/storage.parameters.json \
              --mode Incremental \
              --no-pretty-print

      - name: What-If DEV Compute
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            echo "========== COMPUTE WHAT-IF =========="
            az deployment group what-if \
              --resource-group rg-iac-dev \
              --template-file deployments/compute.bicep \
              --parameters environments/dev/compute.parameters.json \
              --mode Incremental \
              --no-pretty-print

      - name: What-If DEV Hub & Spoke
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
           echo "========== HUB SPOKE WHAT-IF =========="  
           az deployment group what-if \
              --resource-group rg-iac-dev \
              --template-file deployments/hubSpoke.bicep \
              --parameters environments/dev/hubSpoke.parameters.json \
              --mode Incremental \
              --no-pretty-print

      - name: What-If DEV NSGs & ASGs
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            echo "========== NSG WHAT-IF =========="
            az deployment group what-if \
              --resource-group rg-iac-dev \
              --template-file deployments/nsg.bicep \
              --parameters environments/dev/nsg.parameters.json \
              --mode Incremental \
              --no-pretty-print         

      - name: What-If DEV Firewall
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            echo "========== FIREWALL WHAT-IF =========="
            az deployment group what-if \
              --resource-group rg-iac-dev \
              --template-file deployments/firewall.bicep \
              --parameters environments/dev/firewall.parameters.json \
              --mode Incremental \
              --no-pretty-print
              
      - name: What-If DEV Load Balancing
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            echo "========== LOAD BALANCING WHAT-IF =========="
            az deployment group what-if \
              --resource-group rg-iac-dev \
              --template-file deployments/loadBalancing.bicep \
              --parameters environments/dev/loadBalancing.parameters.json \
              --mode Incremental \
              --no-pretty-print       

  # ─────────────────────────────────────────
  # JOB 2: Deploy DEV — only on push to dev
  # ─────────────────────────────────────────
  deploy-dev:
    name: Deploy Infrastructure to DEV
    runs-on: ubuntu-latest
    environment: dev
    needs: validate
    if: (github.event_name == 'push' && github.ref == 'refs/heads/dev') || (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/dev')

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Storage to DEV
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az deployment group create \
              --resource-group rg-iac-dev \
              --template-file deployments/storage.bicep \
              --parameters environments/dev/storage.parameters.json \
              --mode Incremental \
              --name "storage-$(date +%Y%m%d-%H%M%S)"

      - name: Deploy Compute to DEV
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az deployment group create \
              --resource-group rg-iac-dev \
              --template-file deployments/compute.bicep \
              --parameters environments/dev/compute.parameters.json \
              --mode Incremental \
              --name "compute-$(date +%Y%m%d-%H%M%S)"

      - name: Deploy Hub & Spoke to DEV
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az deployment group create \
              --resource-group rg-iac-dev \
              --template-file deployments/hubSpoke.bicep \
              --parameters environments/dev/hubSpoke.parameters.json \
              --mode Incremental \
              --name "hubspoke-$(date +%Y%m%d-%H%M%S)"
              
      - name: Deploy NSGs & ASGs to DEV
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az deployment group create \
              --resource-group rg-iac-dev \
              --template-file deployments/nsg.bicep \
              --parameters environments/dev/nsg.parameters.json \
              --mode Incremental \
              --name "nsg-$(date +%Y%m%d-%H%M%S)" 
              
      - name: Deploy Firewall to DEV
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az deployment group create \
              --resource-group rg-iac-dev \
              --template-file deployments/firewall.bicep \
              --parameters environments/dev/firewall.parameters.json \
              --mode Incremental \
              --name "firewall-$(date +%Y%m%d-%H%M%S)"     
              
      - name: Deploy Load Balancing to DEV
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az deployment group create \
              --resource-group rg-iac-dev \
              --template-file deployments/loadBalancing.bicep \
              --parameters environments/dev/loadBalancing.parameters.json \
              --mode Incremental \
              --name "lb-$(date +%Y%m%d-%H%M%S)"        

      - name: Show DEV Outputs
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az storage account show \
              --name strudeonedev001 \
              --resource-group rg-iac-dev \
              --query '{name:name, sku:sku.name, location:location, tags:tags}' \
              --output table

  # ─────────────────────────────────────────
  # JOB 3: Deploy PROD — only on PR to main
  # ─────────────────────────────────────────
  deploy-prod:
    name: Deploy Infrastructure to PROD
    runs-on: ubuntu-latest
    environment: prod
    needs: validate
    if: github.event_name == 'pull_request' && github.base_ref == 'main'

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: What-If Storage PROD
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az deployment group what-if \
              --resource-group rg-iac-prod \
              --template-file deployments/storage.bicep \
              --parameters environments/prod/storage.parameters.json \
              --mode Incremental
      
      - name: What-If Compute PROD
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az deployment group what-if \
              --resource-group rg-iac-prod \
              --template-file deployments/compute.bicep \
              --parameters environments/prod/compute.parameters.json \
              --mode Incremental
      
      - name: What-If Hub & Spoke PROD
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az deployment group what-if \
              --resource-group rg-iac-prod \
              --template-file deployments/hubSpoke.bicep \
              --parameters environments/prod/hubSpoke.parameters.json \
              --mode Incremental

      - name: What-If NSGs & ASGs PROD
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az deployment group what-if \
              --resource-group rg-iac-prod \
              --template-file deployments/nsg.bicep \
              --parameters environments/prod/nsg.parameters.json \
              --mode Incremental   
              
      - name: What-If Firewall PROD
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az deployment group what-if \
              --resource-group rg-iac-prod \
              --template-file deployments/firewall.bicep \
              --parameters environments/prod/firewall.parameters.json \
              --mode Incremental      
              
      - name: What-If Load Balancing PROD
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az deployment group what-if \
              --resource-group rg-iac-prod \
              --template-file deployments/loadBalancing.bicep \
              --parameters environments/prod/loadBalancing.parameters.json \
              --mode Incremental        

      - name: Deploy Storage to PROD
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az deployment group create \
              --resource-group rg-iac-prod \
              --template-file deployments/storage.bicep \
              --parameters environments/prod/storage.parameters.json \
              --mode Incremental \
              --name "storage-$(date +%Y%m%d-%H%M%S)"

      - name: Deploy Compute to PROD
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az deployment group create \
              --resource-group rg-iac-prod \
              --template-file deployments/compute.bicep \
              --parameters environments/prod/compute.parameters.json \
              --mode Incremental \
              --name "compute-$(date +%Y%m%d-%H%M%S)"    
              
      - name: Deploy Hub & Spoke to PROD
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az deployment group create \
              --resource-group rg-iac-prod \
              --template-file deployments/hubSpoke.bicep \
              --parameters environments/prod/hubSpoke.parameters.json \
              --mode Incremental \
              --name "hubspoke-$(date +%Y%m%d-%H%M%S)"

      - name: Deploy NSGs & ASGs to PROD
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az deployment group create \
              --resource-group rg-iac-prod \
              --template-file deployments/nsg.bicep \
              --parameters environments/prod/nsg.parameters.json \
              --mode Incremental \
              --name "nsg-$(date +%Y%m%d-%H%M%S)"  
              
      - name: Deploy Firewall to PROD
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az deployment group create \
              --resource-group rg-iac-prod \
              --template-file deployments/firewall.bicep \
              --parameters environments/prod/firewall.parameters.json \
              --mode Incremental \
              --name "firewall-$(date +%Y%m%d-%H%M%S)"
              
      - name: Deploy Load Balancing to PROD
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az deployment group create \
              --resource-group rg-iac-prod \
              --template-file deployments/loadBalancing.bicep \
              --parameters environments/prod/loadBalancing.parameters.json \
              --mode Incremental \
              --name "lb-$(date +%Y%m%d-%H%M%S)"        

      - name: Show PROD Outputs
        continue-on-error: true
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az storage account show \
              --name strudeoneprod001 \
              --resource-group rg-iac-prod \
              --query '{name:name, sku:sku.name, location:location, tags:tags}' \
              --output table