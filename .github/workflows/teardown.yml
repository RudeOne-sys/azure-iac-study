name: Teardown Infrastructure

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to teardown'
        required: true
        type: choice
        options:
          - dev
          - prod
          - both
      confirm:
        description: 'Type CONFIRM to proceed'
        required: true
  schedule:
        - cron: '0 22 * * *'  # Runs daily at 22:00 UTC (00:00 SAST)  

jobs:
  teardown:
    name: Teardown ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest
    environment: dev

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Validate confirmation
        if: github.event.inputs.confirm != 'CONFIRM'
        run: |
          echo "You must type CONFIRM to proceed with teardown"
          exit 1

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Teardown DEV
        if: github.event.inputs.environment == 'dev' || github.event.inputs.environment == 'both'
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            echo "Deleting all resources in rg-iac-dev..."
            az group delete --name rg-iac-dev --yes
            echo "Recreating empty rg-iac-dev..."
            az group create --name rg-iac-dev --location southafricanorth

      - name: Teardown PROD
        if: github.event.inputs.environment == 'prod' || github.event.inputs.environment == 'both'
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            echo "Deleting all resources in rg-iac-prod..."
            az group delete --name rg-iac-prod --yes
            echo "Recreating empty rg-iac-prod..."
            az group create --name rg-iac-prod --location southafricanorth